syntax = "proto3";

package com.github.gelald.grpc;

option java_multiple_files = true;
option java_package = "com.github.gelald.grpc";

service HelloService {
  rpc sayHello (HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
